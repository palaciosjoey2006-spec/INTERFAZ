```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Académico UNACH</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f172a,#1e40af,#06b6d4,#7c3aed);
background-size:400% 400%;
animation:fondo 15s ease infinite;
padding:20px;
}

@keyframes fondo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:100%;
max-width:700px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
border-radius:25px;
padding:30px;
box-shadow:0 15px 40px rgba(0,0,0,.35);
color:white;
}

.oculto{
display:none;
}

.logo{
font-size:80px;
text-align:center;
margin-bottom:10px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitulo{
text-align:center;
opacity:.8;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:12px;
outline:none;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:bold;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
}

.ingresar{
background:#00e5ff;
color:black;
}

.userbox{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(255,255,255,.12);
border-radius:15px;
margin-bottom:20px;
}

.usuario{
font-size:18px;
font-weight:bold;
}

.online{
color:#22c55e;
font-weight:bold;
}

.logout{
width:auto;
padding:10px 20px;
background:#ef4444;
color:white;
}

.logout:hover{
background:#dc2626;
}

.hora{
text-align:center;
margin-bottom:20px;
font-size:14px;
opacity:.9;
}

.calculadora{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.calculadora input:last-child{
grid-column:span 2;
}

.calcular{
background:#00e676;
color:black;
}

.resultado{
margin-top:25px;
font-size:30px;
font-weight:bold;
text-align:center;
}

.estado{
margin-top:10px;
font-size:20px;
text-align:center;
}

.barra{
margin-top:20px;
width:100%;
height:25px;
background:rgba(255,255,255,.2);
border-radius:30px;
overflow:hidden;
}

.progreso{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ff88,#00e5ff);
transition:1s;
}

.footer{
margin-top:20px;
text-align:center;
opacity:.8;
}

.error{
text-align:center;
margin-top:15px;
color:#ff6b6b;
font-weight:bold;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="card" id="login">

<div class="logo">🎓</div>

<h1>Sistema Académico UNACH</h1>

<p class="subtitulo">Bienvenido al portal estudiantil 🚀</p>

<input type="text" id="usuario" placeholder="👤 Usuario">

<input type="password" id="clave" placeholder="🔒 Contraseña">

<button class="ingresar" onclick="ingresar()">
🚀 Ingresar al Sistema
</button>

<div class="error" id="mensaje"></div>

</div>

<!-- DASHBOARD -->

<div class="card oculto" id="dashboard">

<div class="userbox">

<div>
<div class="usuario">👨‍🎓 Estudiante@unach</div>
<div class="online">🟢 Usuario en línea</div>
</div>

<button class="logout" onclick="salir()">
🚪 Cerrar sesión
</button>

</div>

<div class="hora" id="hora"></div>

<h2 style="text-align:center;margin-bottom:20px;">
📊 Calculadora de Notas
</h2>

<div class="calculadora">

<input type="number" id="n1" placeholder="📚 Nota Final 1" min="0" max="10">

<input type="number" id="n2" placeholder="📚 Nota Final 2" min="0" max="10">

<input type="number" id="asis" placeholder="📅 Porcentaje de Asistencia" min="0" max="100">

</div>

<button class="calcular" onclick="calcular()">
⚡ Calcular Resultado
</button>

<div class="resultado" id="resultado"></div>

<div class="estado" id="estado"></div>

<div class="barra">
<div class="progreso" id="progreso"></div>
</div>

<div class="footer">
💙 Universidad Nacional de Chimborazo
</div>

</div>

<script>

function ingresar(){

let usuario=document.getElementById("usuario").value;
let clave=document.getElementById("clave").value;

if(usuario==="Estudiante@unach" && clave==="1234"){

document.getElementById("login").classList.add("oculto");
document.getElementById("dashboard").classList.remove("oculto");

}else{

document.getElementById("mensaje").innerHTML=
"❌ Datos inválidos. Intente nuevamente.";

}

}

function salir(){

document.getElementById("dashboard").classList.add("oculto");
document.getElementById("login").classList.remove("oculto");

document.getElementById("usuario").value="";
document.getElementById("clave").value="";
document.getElementById("mensaje").innerHTML="";

}

function calcular(){

let n1=parseFloat(document.getElementById("n1").value)||0;
let n2=parseFloat(document.getElementById("n2").value)||0;
let asistencia=parseFloat(document.getElementById("asis").value)||0;

let promedio=(n1+n2)/2;

document.getElementById("resultado").innerHTML=
"⭐ Nota Final: "+promedio.toFixed(2);

document.getElementById("progreso").style.width=
(promedio*10)+"%";

let mensaje="";

if(asistencia<70){

mensaje="🚫 Reprobado por asistencia";

}
else if(promedio>=9){

mensaje="🏆 Excelente desempeño";

}
else if(promedio>=8){

mensaje="🌟 Muy buen trabajo";

}
else if(promedio>=7){

mensaje="✅ Aprobado";

}
else{

mensaje="❌ Reprobado";

}

document.getElementById("estado").innerHTML=
mensaje + "<br>📅 Asistencia: " + asistencia + "%";

}

function actualizarHora(){

let ahora=new Date();

document.getElementById("hora").innerHTML=
"🕒 " + ahora.toLocaleString();

}

setInterval(actualizarHora,1000);

</script>

</body>
</html>
```

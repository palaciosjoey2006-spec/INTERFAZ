<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Notas UNACH</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
}

.contenedor{
    width:90%;
    max-width:450px;
}

.tarjeta{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    padding:35px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

p{
    text-align:center;
    opacity:.8;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    outline:none;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    background:#0ea5e9;
}

.oculto{
    display:none;
}

.error{
    color:#ff6b6b;
    text-align:center;
    margin-top:10px;
    font-weight:bold;
}

.resultado{
    margin-top:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.estado{
    margin-top:10px;
    text-align:center;
    font-size:18px;
}
</style>
</head>

<body>

<div class="contenedor">

    <!-- LOGIN -->
    <div class="tarjeta" id="login">
        <h1>🎓 UNACH</h1>
        <p>Sistema de Cálculo de Notas</p>

        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="clave" placeholder="Contraseña">

        <button onclick="login()">Ingresar</button>

        <div class="error" id="mensaje"></div>
    </div>

    <!-- CALCULADORA -->
    <div class="tarjeta oculto" id="calculadora">
        <h1>📊 Calculadora de Notas</h1>

        <input type="number" id="n1" placeholder="Nota 1">
        <input type="number" id="n2" placeholder="Nota 2">
        <input type="number" id="n3" placeholder="Nota 3">
        <input type="number" id="n4" placeholder="Nota 4">

        <button onclick="calcular()">Calcular Promedio</button>

        <div class="resultado" id="resultado"></div>
        <div class="estado" id="estado"></div>
    </div>

</div>

<script>

function login(){

    const usuario = document.getElementById("usuario").value;
    const clave = document.getElementById("clave").value;

    if(usuario === "Estudiante@unach" && clave === "1234"){

        document.getElementById("login").classList.add("oculto");
        document.getElementById("calculadora").classList.remove("oculto");

    }else{

        document.getElementById("mensaje").innerHTML =
        "❌ Datos inválidos. Vuelva a ingresar.";
    }
}

function calcular(){

    let n1 = Number(document.getElementById("n1").value);
    let n2 = Number(document.getElementById("n2").value);
    let n3 = Number(document.getElementById("n3").value);
    let n4 = Number(document.getElementById("n4").value);

    let promedio = (n1+n2+n3+n4)/4;

    document.getElementById("resultado").innerHTML =
    "Promedio: " + promedio.toFixed(2);

    if(promedio >= 7){
        document.getElementById("estado").innerHTML =
        "✅ APROBADO";
    }else{
        document.getElementById("estado").innerHTML =
        "❌ REPROBADO";
    }
}

</script>

</body>
</html>
